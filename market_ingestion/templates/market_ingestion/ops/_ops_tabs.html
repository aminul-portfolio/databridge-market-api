{# market_ingestion/templates/market_ingestion/ops/_ops_tabs.html #}
<section class="ops-tabs-wrap">
  <div class="ops-tabs-meta">
    <p class="ops-tabs-label">Operations Workspace</p>
    <p class="ops-tabs-subtitle">Inspect operational summaries, ETL [Extract, Transform, Load] runs, metric outputs, and normalized market bars.</p>
  </div>

  <nav class="ops-tabs-bar" aria-label="Operational navigation">
    <a
      href="{% url 'ops:dashboard' %}"
      class="ops-tab-link{% if current_section == 'dashboard' %} is-active{% endif %}"
      {% if current_section == 'dashboard' %}aria-current="page"{% endif %}
    >
      Ops Dashboard
    </a>

    <a
      href="{% url 'ops:ingestion_runs' %}"
      class="ops-tab-link{% if current_section == 'runs' %} is-active{% endif %}"
      {% if current_section == 'runs' %}aria-current="page"{% endif %}
    >
      Ingestion Runs
    </a>

    <a
      href="{% url 'ops:metric_snapshots' %}"
      class="ops-tab-link{% if current_section == 'snapshots' %} is-active{% endif %}"
      {% if current_section == 'snapshots' %}aria-current="page"{% endif %}
    >
      Metric Snapshots
    </a>

    <a
      href="{% url 'ops:market_bars' %}"
      class="ops-tab-link{% if current_section == 'bars' %} is-active{% endif %}"
      {% if current_section == 'bars' %}aria-current="page"{% endif %}
    >
      Market Bars
    </a>
  </nav>
</section>
